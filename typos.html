<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tekton Editor — v0.2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { margin: 0; padding: 0; height: 100%; }
    body {
      background: #0a0c10;
      color: #e8e6e1;
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
    }
    /* Scrollbar styling for the dark theme */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #0a0c10; }
    ::-webkit-scrollbar-thumb { background: #2a3140; border: 2px solid #0a0c10; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a4150; }
    /* Boot screen shown until React mounts */
    #boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: #0a0c10; color: #7a8290;
      font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px;
      letter-spacing: 1px; text-transform: uppercase;
      z-index: 9999; transition: opacity 200ms;
    }
    #boot .logo {
      width: 32px; height: 32px; background: #d97757; color: #000;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px; font-family: 'JetBrains Mono', monospace;
    }
    #boot .pulse {
      display: inline-block; width: 6px; height: 6px; background: #d97757;
      border-radius: 50%; animation: tekton-pulse 1s ease-in-out infinite;
    }
    @keyframes tekton-pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%      { opacity: 1;   transform: scale(1.2); }
    }
  </style>

  <!-- React + Babel via CDN (development builds — full warnings; for prod swap to .production.min.js) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>

<body>
  <div id="boot">
    <div class="logo">τ</div>
    <div>tekton editor — booting <span class="pulse"></span></div>
    <div style="font-size: 10px; color: #4a5160; text-transform: none; letter-spacing: 0;">
      compilation Babel en cours, premier chargement peut prendre quelques secondes
    </div>
  </div>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    /* === Pull React + hooks from the global window (loaded via CDN above) === */
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    /* ============================================================================
     * BEGIN — TEKTON EDITOR v0.2 source (unchanged from tekton-editor-v2.jsx)
     * The only edits relative to the original file are:
     *   - removed: import React, { … } from 'react';
     *   - removed: 'export default' on TektonEditor
     * ============================================================================ */

    /* ============================================================================
     * TEKTON EDITOR — v0.2
     * Adds: free drag (flow-reorder + Alt to free-float), copy/scroll on state,
     * per-component outline colors, node-graph tab with drag-to-reparent,
     * read-only parent directives auto-derived from tree.
     * ============================================================================ */
    
    /* ============================================================================
     * MODULE — DIRECTIVES REGISTRY
     * Two new derived (read-only) directives: tekton-tag-parent-id / -type.
     * They are auto-recomputed whenever the tree changes; users cannot edit them.
     * ============================================================================ */
    const getDirectives = () => [
      { key: 'tekton-tag-id',          label: 'Tag ID',          role: 'id',         derived: false },
      { key: 'tekton-tag-name',        label: 'Tag Name',        role: 'name',       derived: false },
      { key: 'tekton-tag-parent-id',   label: 'Parent ID',       role: 'parent-id',  derived: true  },
      { key: 'tekton-tag-parent-type', label: 'Parent Type',     role: 'parent-type',derived: true  },
      // FUTURE: { key: 'tekton-tag-bind', label: 'Bind', derived: false },
    ];
    
    const buildDefaultDirectives = (overrides = {}) => {
      const map = {};
      for (const d of getDirectives()) map[d.key] = overrides[d.key] ?? '';
      return map;
    };
    
    /* ============================================================================
     * MODULE — AVAILABLE COMPONENTS                              [API_HOOK ready]
     * Each entry now carries a `color` used for the canvas outline and graph node.
     * ============================================================================ */
    const getAvailableComponents = () => [
      { type: 'div',     label: 'Div',     icon: '▢', color: '#7aa2f7', category: 'structure' },
      { type: 'header',  label: 'Header',  icon: '◰', color: '#bb9af7', category: 'structure' },
      { type: 'footer',  label: 'Footer',  icon: '◱', color: '#9d7cd8', category: 'structure' },
      { type: 'section', label: 'Section', icon: '▤', color: '#7dcfff', category: 'structure' },
      { type: 'article', label: 'Article', icon: '▥', color: '#73daca', category: 'structure' },
      { type: 'main',    label: 'Main',    icon: '▣', color: '#e0af68', category: 'structure' },
      { type: 'aside',   label: 'Aside',   icon: '▦', color: '#f7768e', category: 'structure' },
      { type: 'nav',     label: 'Nav',     icon: '═', color: '#ff9e64', category: 'structure' },
    ];
    
    const getComponentMeta = (type) => getAvailableComponents().find(c => c.type === type)
      || { type, label: type, icon: '◇', color: '#888', category: 'unknown' };
    
    /* ============================================================================
     * MODULE — DEFAULT TEMPLATES                                 [API_HOOK ready]
     * ============================================================================ */
    const getDefaultTemplates = () => [
      {
        id: 'tpl_blank',
        name: 'Blank',
        targetType: 'web',
        description: 'Conteneur vide.',
        builder: () => createElement('div', { name: 'root', styleOptions: { minHeight: '600px', backgroundColor: '#ffffff' } }),
      },
      {
        id: 'tpl_three',
        name: 'Header / Body / Footer',
        targetType: 'web',
        description: 'Trois sections classiques.',
        builder: () => {
          const root = createElement('div', { name: 'root', styleOptions: { display: 'flex', flexDirection: 'column', minHeight: '700px', backgroundColor: '#ffffff' } });
          root.children.push(createElement('header', { name: 'site-header', styleOptions: { height: '80px', backgroundColor: '#1f2937' } }));
          root.children.push(createElement('main',   { name: 'site-body',   styleOptions: { flex: '1', backgroundColor: '#f3f4f6', minHeight: '400px' } }));
          root.children.push(createElement('footer', { name: 'site-footer', styleOptions: { height: '60px', backgroundColor: '#111827' } }));
          return root;
        },
      },
      {
        id: 'tpl_two_col',
        name: 'Sidebar + Main',
        targetType: 'web',
        description: 'Deux colonnes côte à côte.',
        builder: () => {
          const root = createElement('div', { name: 'root', styleOptions: { display: 'flex', flexDirection: 'row', minHeight: '600px', backgroundColor: '#ffffff' } });
          root.children.push(createElement('aside',   { name: 'sidebar', styleOptions: { width: '240px', backgroundColor: '#1f2937' } }));
          root.children.push(createElement('section', { name: 'content', styleOptions: { flex: '1', backgroundColor: '#f9fafb' } }));
          return root;
        },
      },
      {
        id: 'tpl_phone_app',
        name: 'Mobile App Shell',
        targetType: 'mobile',
        description: 'Top bar + content + tab bar.',
        builder: () => {
          const root = createElement('div', { name: 'app-shell', styleOptions: { display: 'flex', flexDirection: 'column', width: '375px', height: '667px', backgroundColor: '#ffffff', margin: '0 auto' } });
          root.children.push(createElement('header', { name: 'top-bar',  styleOptions: { height: '56px',  backgroundColor: '#0f172a' } }));
          root.children.push(createElement('main',   { name: 'content',  styleOptions: { flex: '1',       backgroundColor: '#f1f5f9' } }));
          root.children.push(createElement('nav',    { name: 'tab-bar',  styleOptions: { height: '64px',  backgroundColor: '#0f172a' } }));
          return root;
        },
      },
    ];
    
    /* ============================================================================
     * MODULE — TARGET TYPES
     * ============================================================================ */
    const getTargetTypes = () => [
      { key: 'web',     label: 'Web',     viewport: { width: 1280, height: 800 } },
      { key: 'tablet',  label: 'Tablet',  viewport: { width: 768,  height: 1024 } },
      { key: 'mobile',  label: 'Mobile',  viewport: { width: 375,  height: 667  } },
    ];
    
    /* ============================================================================
     * MODULE — STORAGE ADAPTER                                   [swap-ready]
     * ============================================================================ */
    let _MEMORY_STATE_ = null;
    const StorageAdapter = {
      async loadProject() {
        return _MEMORY_STATE_ ? JSON.parse(JSON.stringify(_MEMORY_STATE_)) : null;
        // FUTURE localStorage:
        //   const raw = localStorage.getItem('tekton.project'); return raw ? JSON.parse(raw) : null;
        // FUTURE API:
        //   const res = await fetch('/api/projects/current'); return res.ok ? res.json() : null;
      },
      async saveProject(project) {
        _MEMORY_STATE_ = JSON.parse(JSON.stringify(project));
        return true;
      },
      async listProjects() { return _MEMORY_STATE_ ? [_MEMORY_STATE_] : []; },
    };
    
    /* ============================================================================
     * MODULE — LOGGER
     * ============================================================================ */
    class TektonLogger {
      constructor() { this.entries = []; this.subs = new Set(); }
      subscribe(fn) { this.subs.add(fn); fn(this.entries); return () => this.subs.delete(fn); }
      _emit() { for (const fn of this.subs) fn(this.entries); }
      log(level, msg, meta) {
        this.entries = [...this.entries, { id: shortId(), level, msg, meta: meta ?? null, ts: new Date() }];
        this._emit();
      }
      info(m, meta)  { this.log('info',  m, meta); }
      warn(m, meta)  { this.log('warn',  m, meta); }
      error(m, meta) { this.log('error', m, meta); }
      clear() { this.entries = []; this._emit(); }
    }
    const logger = new TektonLogger();
    
    /* ============================================================================
     * MODULE — UTILITIES
     * ============================================================================ */
    const shortId = () => Math.random().toString(36).slice(2, 10);
    const newElementId = () => 'el_' + shortId();
    const newTemplateId = () => 'tpl_' + shortId();
    
    /* ============================================================================
     * MODULE — ELEMENT FACTORY & TREE OPS
     * ============================================================================ */
    function createElement(type = 'div', overrides = {}) {
      const id   = overrides.id   || newElementId();
      const name = overrides.name || `${type}-${id.slice(3, 7)}`;
      return {
        id,
        type,
        directives: buildDefaultDirectives({
          'tekton-tag-id': id,
          'tekton-tag-name': name,
          // parent-id / parent-type are filled by recomputeDerivedDirectives
          ...(overrides.directives || {}),
        }),
        styleOptions: { ...(overrides.styleOptions || {}) },
        customCss: overrides.customCss || '',
        classes: overrides.classes || [],
        children: overrides.children || [],
      };
    }
    
    function findElement(node, id) {
      if (!node) return null;
      if (node.id === id) return node;
      for (const c of node.children) {
        const f = findElement(c, id);
        if (f) return f;
      }
      return null;
    }
    
    function findParent(node, id, parent = null) {
      if (!node) return null;
      if (node.id === id) return parent;
      for (const c of node.children) {
        const f = findParent(c, id, node);
        if (f) return f;
      }
      return null;
    }
    
    function isDescendant(node, ancestorId, targetId) {
      // returns true if targetId lives under the subtree rooted at ancestorId
      const subtree = findElement(node, ancestorId);
      if (!subtree) return false;
      return !!findElement(subtree, targetId);
    }
    
    function updateElement(node, id, updater) {
      if (node.id === id) return updater(node);
      return { ...node, children: node.children.map(c => updateElement(c, id, updater)) };
    }
    
    function addChild(node, parentId, child) {
      if (node.id === parentId) return { ...node, children: [...node.children, child] };
      return { ...node, children: node.children.map(c => addChild(c, parentId, child)) };
    }
    
    function removeElement(node, id) {
      return { ...node, children: node.children.filter(c => c.id !== id).map(c => removeElement(c, id)) };
    }
    
    function reparentElement(tree, sourceId, newParentId) {
      // refuse: root, self, descendant-of-self
      if (sourceId === tree.id) return { tree, error: 'Impossible de déplacer le root' };
      if (sourceId === newParentId) return { tree, error: 'Un élément ne peut être son propre parent' };
      if (isDescendant(tree, sourceId, newParentId)) return { tree, error: 'Cycle interdit (parent dans ses descendants)' };
      const source = findElement(tree, sourceId);
      if (!source) return { tree, error: 'Source introuvable' };
      const newParent = findElement(tree, newParentId);
      if (!newParent) return { tree, error: 'Parent cible introuvable' };
      const currentParent = findParent(tree, sourceId);
      if (currentParent && currentParent.id === newParentId) return { tree, error: 'Déjà dans ce parent' };
      // detach + attach at end
      const detached = removeElement(tree, sourceId);
      const attached = addChild(detached, newParentId, source);
      return { tree: attached, error: null };
    }
    
    /* recomputeDerivedDirectives:
     * walks the tree and sets tekton-tag-parent-id / -type on every element from
     * its actual parent. Called after every tree mutation. */
    function recomputeDerivedDirectives(node, parent = null) {
      const directives = {
        ...node.directives,
        'tekton-tag-parent-id':   parent ? parent.id   : '',
        'tekton-tag-parent-type': parent ? parent.type : '',
      };
      return {
        ...node,
        directives,
        children: node.children.map(c => recomputeDerivedDirectives(c, node)),
      };
    }
    
    /* ============================================================================
     * MODULE — CSS UTILITIES & STYLE PRECEDENCE
     * customCss DOMINATES styleOptions field-by-field.
     * ============================================================================ */
    function cssStringToObject(css) {
      if (!css || !css.trim()) return {};
      const body = css.includes('{') ? (css.match(/\{([\s\S]*)\}/)?.[1] || '') : css;
      const out = {};
      for (const decl of body.split(';')) {
        const [k, ...rest] = decl.split(':');
        if (!k || !rest.length) continue;
        const key = k.trim().replace(/-([a-z])/g, (_, c) => c.toUpperCase());
        if (key) out[key] = rest.join(':').trim();
      }
      return out;
    }
    function cssObjectToString(obj) {
      if (!obj || !Object.keys(obj).length) return '';
      return Object.entries(obj)
        .map(([k, v]) => `${k.replace(/[A-Z]/g, m => '-' + m.toLowerCase())}: ${v};`)
        .join('\n');
    }
    function safeJsonParse(s) { try { return [JSON.parse(s), null]; } catch (e) { return [null, e.message]; } }
    function prettyJson(obj) { try { return JSON.stringify(obj, null, 2); } catch { return ''; } }
    function computeFinalStyle(element) {
      return { ...element.styleOptions, ...cssStringToObject(element.customCss) };
    }
    
    /* ============================================================================
     * MODULE — HTML SERIALIZER
     * ============================================================================ */
    function elementToHtml(el, indent, projectConfig, templateConfig) {
      const pad = '  '.repeat(indent);
      const dirs = getDirectives();
      const overrides = { ...(projectConfig?.directiveOverrides || {}), ...(templateConfig?.directiveOverrides || {}) };
      const dirAttrs = dirs.map(d => {
        const attrName = overrides[d.key] || d.key;
        const v = el.directives[d.key] || '';
        return `${attrName}="${escapeAttr(v)}"`;
      }).join(' ');
      const classAttr = el.classes.length ? ` class="${el.classes.join(' ')}"` : '';
      const finalStyle = computeFinalStyle(el);
      const styleStr = Object.entries(finalStyle)
        .map(([k, v]) => `${k.replace(/[A-Z]/g, m => '-' + m.toLowerCase())}: ${v}`)
        .join('; ');
      const styleAttr = styleStr ? ` style="${styleStr}"` : '';
      const open  = `${pad}<${el.type} id="${el.id}" ${dirAttrs}${classAttr}${styleAttr}>`;
      const close = `</${el.type}>`;
      if (!el.children.length) return `${open}${close}`;
      const inner = el.children.map(c => elementToHtml(c, indent + 1, projectConfig, templateConfig)).join('\n');
      return `${open}\n${inner}\n${pad}${close}`;
    }
    const escapeAttr = (s) => String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    
    /* ============================================================================
     * MODULE — PROJECT FACTORY
     * ============================================================================ */
    function createProject(name = 'Mon Projet') {
      const tpl = getDefaultTemplates()[0];
      const t = createTemplateFrom(tpl, 'Page principale');
      return {
        name, version: 'v0.1',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        config: {
          directiveOverrides: {},
          globalClasses: [],
          containerStyle: {},
        },
        templates: [t],
        activeTemplateId: t.id,
      };
    }
    function createTemplateFrom(defaultTemplate, name) {
      return {
        id: newTemplateId(),
        name,
        targetType: defaultTemplate.targetType,
        sourceTemplateId: defaultTemplate.id,
        config: { directiveOverrides: {}, globalClasses: [], containerStyle: {} },
        tree: recomputeDerivedDirectives(defaultTemplate.builder()),
      };
    }
    
    /* ============================================================================
     * MODULE — STYLE OPTION FIELDS
     * ============================================================================ */
    const STYLE_FIELDS = [
      { key: 'width',           label: 'width',            placeholder: '100px / 50%' },
      { key: 'height',          label: 'height',           placeholder: '100px / auto' },
      { key: 'minWidth',        label: 'min-width',        placeholder: '0' },
      { key: 'maxWidth',        label: 'max-width',        placeholder: '100%' },
      { key: 'minHeight',       label: 'min-height',       placeholder: '0' },
      { key: 'maxHeight',       label: 'max-height',       placeholder: 'none' },
      { key: 'margin',          label: 'margin',           placeholder: '0 auto' },
      { key: 'padding',         label: 'padding',          placeholder: '12px' },
      { key: 'top',             label: 'top',              placeholder: '0' },
      { key: 'right',           label: 'right',            placeholder: '0' },
      { key: 'bottom',          label: 'bottom',           placeholder: '0' },
      { key: 'left',            label: 'left',             placeholder: '0' },
      { key: 'color',           label: 'color',            placeholder: '#000' },
      { key: 'backgroundColor', label: 'background-color', placeholder: '#fff' },
      { key: 'borderRadius',    label: 'border-radius',    placeholder: '0' },
      { key: 'border',          label: 'border',           placeholder: '1px solid #ccc' },
      { key: 'display',         label: 'display',          placeholder: 'block / flex' },
      { key: 'flexDirection',   label: 'flex-direction',   placeholder: 'row / column' },
      { key: 'justifyContent',  label: 'justify-content',  placeholder: 'center' },
      { key: 'alignItems',      label: 'align-items',      placeholder: 'center' },
      { key: 'gap',             label: 'gap',              placeholder: '8px' },
      { key: 'overflow',        label: 'overflow',         placeholder: 'auto' },
      { key: 'zIndex',          label: 'z-index',          placeholder: '0' },
      { key: 'opacity',         label: 'opacity',          placeholder: '1' },
    ];
    const POSITION_VALUES = ['static', 'relative', 'absolute', 'fixed', 'sticky'];
    
    /* ============================================================================
     * UI — DESIGN TOKENS
     * ============================================================================ */
    const T = {
      bg:        '#0a0c10',
      surface:   '#11141a',
      surface2:  '#161a22',
      surface3:  '#1c2029',
      border:    '#1f2530',
      borderHi:  '#2a3140',
      text:      '#e8e6e1',
      muted:     '#7a8290',
      dim:       '#4a5160',
      accent:    '#d97757',
      accentDim: '#5a3424',
      good:      '#7cb88a',
      warn:      '#d4a857',
      bad:       '#d96b6b',
      fontMono:  "'JetBrains Mono', ui-monospace, Menlo, monospace",
      fontUi:    "'Bricolage Grotesque', system-ui, sans-serif",
    };
    
    /* ============================================================================
     * UI — small utilities for inline styles
     * ============================================================================ */
    function inputStyle(extra = {}) {
      return {
        width: '100%', background: T.bg, border: `1px solid ${T.border}`, color: T.text,
        fontFamily: T.fontMono, fontSize: 12, padding: '6px 8px', outline: 'none',
        ...extra,
      };
    }
    function ghostBtn(color = T.muted) {
      return {
        background: 'transparent',
        border: `1px solid ${color === T.accent ? T.accent : T.border}`,
        color, fontFamily: T.fontMono, fontSize: 10, letterSpacing: 1, textTransform: 'uppercase',
        padding: '3px 8px', cursor: 'pointer',
      };
    }
    function hexWithAlpha(hex, alpha) {
      // #rrggbb -> rgba
      if (!hex || !hex.startsWith('#') || hex.length < 7) return hex;
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }
    
    /* ============================================================================
     * UI — Custom hooks
     * ============================================================================ */
    function useLogger() {
      const [entries, setEntries] = useState(logger.entries);
      useEffect(() => logger.subscribe(setEntries), []);
      return entries;
    }
    
    /* ============================================================================
     * UI — CONSOLE PANEL
     * ============================================================================ */
    function ConsolePanel({ collapsed, onToggle }) {
      const entries = useLogger();
      const ref = useRef(null);
      useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [entries]);
      const fmt = (d) => d.toTimeString().slice(0, 8) + '.' + String(d.getMilliseconds()).padStart(3, '0');
      const colors = { info: T.muted, warn: T.warn, error: T.bad };
      const prefix = { info: '›', warn: '⚠', error: '✕' };
    
      return (
        <div style={{ borderTop: `1px solid ${T.border}`, background: T.bg, fontFamily: T.fontMono, fontSize: 11, color: T.text, height: collapsed ? 28 : 200, transition: 'height 200ms', display: 'flex', flexDirection: 'column' }}>
          <div style={{ height: 28, padding: '0 12px', display: 'flex', alignItems: 'center', gap: 12, borderBottom: collapsed ? 'none' : `1px solid ${T.border}`, color: T.muted, cursor: 'pointer', userSelect: 'none' }} onClick={onToggle}>
            <span style={{ color: T.accent }}>{collapsed ? '▸' : '▾'}</span>
            <span style={{ letterSpacing: 1.5, fontSize: 10, textTransform: 'uppercase' }}>console</span>
            <span style={{ color: T.dim }}>· {entries.length} entries</span>
            <button onClick={(e) => { e.stopPropagation(); logger.clear(); }} style={{ marginLeft: 'auto', background: 'transparent', border: `1px solid ${T.border}`, color: T.muted, fontFamily: T.fontMono, fontSize: 10, padding: '2px 8px', cursor: 'pointer' }}>clear</button>
          </div>
          {!collapsed && (
            <div ref={ref} style={{ flex: 1, overflowY: 'auto', padding: '8px 12px' }}>
              {entries.length === 0 && <div style={{ color: T.dim }}>$ awaiting events…</div>}
              {entries.map(e => (
                <div key={e.id} style={{ display: 'flex', gap: 8, padding: '2px 0', color: colors[e.level] }}>
                  <span style={{ color: T.dim, minWidth: 90 }}>{fmt(e.ts)}</span>
                  <span style={{ width: 12 }}>{prefix[e.level]}</span>
                  <span style={{ flex: 1 }}>{e.msg}{e.meta ? <span style={{ color: T.dim }}> {JSON.stringify(e.meta)}</span> : null}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }
    
    /* ============================================================================
     * UI — TABS

    function Tabs({ tabs, value, onChange }) {

    /* ============================================================================
     * UI — EDIT MODAL (Info / Style)
     * Parent directives are read-only here.

      useEffect(() => {

                style={{ marginLeft: 'auto', background: 'transparent', border: `1px solid ${T.bad}`, color: T.bad, padding: '4px 10px', fontFamily: T.fontMono, fontSize: 11, cursor: 'pointer' }}>delete</button>

                        </div>

                          onChange={e => !d.derived && patchDir(d.key, e.target.value)}

                    <div style={{ color: T.dim }}>Enfants: {element.children.length}</div>

              {tab === 'style' && (

                      {POSITION_VALUES.map(p => <option key={p} value={p}>{p}</option>)}
                    </select>
                  </div>
                  <div>
                    <div style={{ color: T.muted, fontSize: 10, letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 8 }}>Options (overridables par CSS custom)</div>

                      {STYLE_FIELDS.map(f => (
                        <div key={f.key}>
                          <div style={{ color: T.dim, fontSize: 10, marginBottom: 2 }}>{f.label}</div>
                          <input value={element.styleOptions[f.key] || ''} placeholder={f.placeholder}
                            onChange={e => patchOpt(f.key, e.target.value)} style={inputStyle()} />
                        </div>
                      ))}
                    </div>
                  </div>
                  <div style={{ paddingTop: 12, borderTop: `1px solid ${T.border}` }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 6 }}>
                      <div style={{ color: T.muted, fontSize: 10, letterSpacing: 1.5, textTransform: 'uppercase' }}>CSS custom (dominant)</div>
                      <span style={{ color: T.dim, fontSize: 10 }}>écrase les options ci-dessus</span>
                      <button onClick={cssToJson} style={ghostBtn()}>css → json</button>
                      <button onClick={applyCss}  style={ghostBtn(T.accent)}>apply</button>
                    </div>
                    <textarea value={cssDraft} onChange={e => setCssDraft(e.target.value)}
                      placeholder={'height: 120px;\nbackground-color: #fafafa;'}
                      style={{ ...inputStyle({ height: 120, resize: 'vertical' }) }} />
                  </div>
                  <div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 6 }}>
                      <div style={{ color: T.muted, fontSize: 10, letterSpacing: 1.5, textTransform: 'uppercase' }}>JSON style object</div>
                      <button onClick={jsonToCss} style={ghostBtn(T.accent)}>json → css & apply</button>
                      {jsonErr && <span style={{ color: T.bad, fontSize: 10 }}>{jsonErr}</span>}
                    </div>
                    <textarea value={jsonDraft} onChange={e => setJsonDraft(e.target.value)}

    function Field({ label, value, onChange }) {
      return (
        <div>
          <div style={{ color: T.dim, fontSize: 10, marginBottom: 3 }}>{label}</div>
          <input value={value} onChange={e => onChange(e.target.value)} style={inputStyle()} />
        </div>
      );
    }
    
    /* ============================================================================
     * UI — DRAG STATE (module-level singleton for HTML5 DnD payload)
     * Reasoning: react state for drag payload races with native dragstart; a
     * module-level ref is the simplest and most reliable handoff.
     * ============================================================================ */
    const DragState = {
      draggingId: null,
      setDragging(id) { this.draggingId = id; },
      clear() { this.draggingId = null; },
    };
    
    /* ============================================================================
     * UI — DROP ZONE (between siblings + on container) for flow reordering
     * ============================================================================ */
    function FlowDropZone({ onDrop, kind = 'between', parentId }) {
      const [hover, setHover] = useState(false);
      const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setHover(true); };
      const handleDragLeave = () => setHover(false);
      const handleDrop = (e) => {
        e.preventDefault(); e.stopPropagation();
        setHover(false);
        if (DragState.draggingId) onDrop(DragState.draggingId);
      };
      if (kind === 'between') {
        return (
          <div onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}
            style={{
              height: hover ? 24 : 6, transition: 'all 120ms',
              background: hover ? hexWithAlpha(T.accent, 0.3) : 'transparent',
              borderTop: hover ? `2px solid ${T.accent}` : '2px solid transparent',
              borderBottom: hover ? `2px solid ${T.accent}` : '2px solid transparent',
            }} />
        );
      }
      // 'inside' overlay zone for container drop
      return null;
    }
    
    /* ============================================================================
     * UI — ELEMENT ON CANVAS
     * Two drag modes:
     *   - normal drag: HTML5 drag, reorders in flow via FlowDropZones (handle the
     *     reparent + reorder).
     *   - Alt+mousedown on the label: free positioning. Switches the element to
     *     position:absolute the first time, then updates left/top.
     * Resize via 4 corner handles when selected.
     * ============================================================================ */
    function ElementOnCanvas({ element, selectedId, onSelect, onUpdate, onDelete, onEdit, onReparent, onReorder, projectConfig, templateConfig, depth = 0, parentId = null, indexInParent = 0, isLast = false }) {
      const ref = useRef(null);
      const finalStyle = computeFinalStyle(element);
      const isSelected = selectedId === element.id;
      const isFloating = ['absolute', 'fixed', 'sticky'].includes(finalStyle.position);
      const meta = getComponentMeta(element.type);
      const isRoot = parentId === null;
    
      /* ---- Resize via corner handles ---- */
      const startResize = (corner) => (e) => {
        e.stopPropagation(); e.preventDefault();
        const rect = ref.current.getBoundingClientRect();
        const startX = e.clientX, startY = e.clientY;
        const startW = rect.width, startH = rect.height;
        const onMove = (ev) => {
          const dx = ev.clientX - startX, dy = ev.clientY - startY;
          let w = startW, h = startH;
          if (corner.includes('e')) w = Math.max(20, startW + dx);
          if (corner.includes('w')) w = Math.max(20, startW - dx);
          if (corner.includes('s')) h = Math.max(20, startH + dy);
          if (corner.includes('n')) h = Math.max(20, startH - dy);
          onUpdate(prev => ({ ...prev, styleOptions: { ...prev.styleOptions, width: Math.round(w) + 'px', height: Math.round(h) + 'px' } }));
        };
        const onUp = () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          logger.info('Element redimensionné', { id: element.id });
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      };
    
      /* ---- Free move (Alt+drag on label) ----
       * If the element is not floating, we promote it to position:absolute on first
       * move so that left/top take effect. Behavior preserved across drag.
       */
      const startFreeMove = (e) => {
        if (!e.altKey) return; // only when Alt held
        e.stopPropagation(); e.preventDefault();
        const startX = e.clientX, startY = e.clientY;
        const startTop  = parseFloat(finalStyle.top  || '0') || 0;
        const startLeft = parseFloat(finalStyle.left || '0') || 0;
        let promoted = false;
        const onMove = (ev) => {
          const dx = ev.clientX - startX, dy = ev.clientY - startY;
          onUpdate(prev => {
            const so = { ...prev.styleOptions };
            if (!promoted && !['absolute','fixed','sticky'].includes(so.position)) {
              so.position = 'absolute';
              promoted = true;
            }
            so.left = (startLeft + dx) + 'px';
            so.top  = (startTop  + dy) + 'px';
            return { ...prev, styleOptions: so };
          });
        };
        const onUp = () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          logger.info('Element libéré (Alt+drag)', { id: element.id, position: 'absolute' });
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      };
    
      /* ---- Plain drag (flow reorder / reparent) ---- */
      const handleDragStart = (e) => {
        if (isRoot) { e.preventDefault(); return; }
        e.stopPropagation();
        DragState.setDragging(element.id);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', element.id);
      };
      const handleDragEnd = () => DragState.clear();
    
      /* ---- Drop ON the element (means: drop INTO as last child) ---- */
      const [insideHover, setInsideHover] = useState(false);
      const handleDragOverContainer = (e) => {
        if (!DragState.draggingId || DragState.draggingId === element.id) return;
        e.preventDefault(); e.stopPropagation();
        setInsideHover(true);
      };
      const handleDragLeaveContainer = () => setInsideHover(false);
      const handleDropContainer = (e) => {
        e.preventDefault(); e.stopPropagation();
        setInsideHover(false);
        if (DragState.draggingId && DragState.draggingId !== element.id) {
          onReparent(DragState.draggingId, element.id);
        }
      };
    
      /* ---- Outline color per component type ---- */
      const outlineColor = isSelected ? meta.color : hexWithAlpha(meta.color, 0.45);
      const containerStyle = {
        ...finalStyle,
        minHeight: finalStyle.minHeight || (element.children.length ? finalStyle.minHeight : '40px'),
        minWidth:  finalStyle.minWidth  || (element.children.length ? finalStyle.minWidth  : '40px'),
        boxSizing: 'border-box',
        outline: isSelected ? `2px solid ${outlineColor}` : `1px dashed ${outlineColor}`,
        outlineOffset: isSelected ? 0 : -1,
        cursor: 'pointer',
        position: finalStyle.position || 'relative',
        boxShadow: insideHover ? `inset 0 0 0 3px ${T.accent}` : 'none',
        transition: 'box-shadow 100ms',
      };
    
      return (
        <div
          ref={ref}
          draggable={!isRoot}
          onDragStart={handleDragStart}
          onDragEnd={handleDragEnd}
          onDragOver={handleDragOverContainer}
          onDragLeave={handleDragLeaveContainer}
          onDrop={handleDropContainer}
          onClick={(e) => { e.stopPropagation(); onSelect(element.id); }}
          style={containerStyle}
          data-tekton-id={element.id}
        >
          {/* drop zone before first child */}
          {element.children.length > 0 && (
            <FlowDropZone onDrop={(srcId) => onReorder(srcId, element.id, 0)} parentId={element.id} />
          )}
    
          {element.children.map((c, idx) => (
            <React.Fragment key={c.id}>
              <ElementOnCanvas
                element={c}
                selectedId={selectedId}
                onSelect={onSelect}
                onUpdate={(updater) => onUpdate(prev => updateElement(prev, c.id, updater))}
                onDelete={onDelete}
                onEdit={onEdit}
                onReparent={onReparent}
                onReorder={onReorder}
                projectConfig={projectConfig}
                templateConfig={templateConfig}
                depth={depth + 1}
                parentId={element.id}
                indexInParent={idx}
                isLast={idx === element.children.length - 1}
              />
              {/* drop zone after each child = reorder slot */}
              <FlowDropZone onDrop={(srcId) => onReorder(srcId, element.id, idx + 1)} parentId={element.id} />
            </React.Fragment>
          ))}
    
          {!element.children.length && (
            <div style={{ fontFamily: T.fontMono, fontSize: 10, color: hexWithAlpha(meta.color, 0.7), padding: 8, pointerEvents: 'none' }}>
              {meta.icon} ‹{element.type}#{element.directives['tekton-tag-name']}›
            </div>
          )}
    
          {isSelected && (
            <>
              {/* selection label */}
              <div onMouseDown={startFreeMove}
                title="Maintenir Alt + glisser pour libérer en position:absolute"
                style={{
                  position: 'absolute', top: -22, left: -2, height: 20, padding: '0 4px 0 8px',
                  background: meta.color, color: '#000',
                  fontFamily: T.fontMono, fontSize: 10, display: 'flex', alignItems: 'center', gap: 6,
                  cursor: 'grab', userSelect: 'none', zIndex: 10,
                }}>
                <span>{meta.icon}</span>
                <span>{element.type}</span>
                <span style={{ opacity: 0.6 }}>·</span>
                <span>{element.directives['tekton-tag-name']}</span>
                {isFloating && <span style={{ opacity: 0.7 }}>⤧</span>}
                <button onClick={(e) => { e.stopPropagation(); onEdit && onEdit(element.id); }}
                  style={{ background: 'rgba(0,0,0,0.25)', border: 'none', color: '#000', fontFamily: T.fontMono, fontSize: 10, padding: '0 6px', cursor: 'pointer', height: 16, marginLeft: 4 }}>edit</button>
                {!isRoot && <button onClick={(e) => { e.stopPropagation(); if (confirm('Supprimer ?')) onDelete(element.id); }}
                  style={{ background: 'rgba(0,0,0,0.25)', border: 'none', color: '#000', fontFamily: T.fontMono, fontSize: 10, padding: '0 6px', cursor: 'pointer', height: 16 }}>×</button>}
              </div>
              {/* corner handles */}
              {['nw','ne','sw','se'].map(c => (
                <div key={c} onMouseDown={startResize(c)} style={{
                  position: 'absolute', width: 10, height: 10, background: T.bg, border: `2px solid ${meta.color}`,
                  [c.includes('n') ? 'top' : 'bottom']: -5,
                  [c.includes('w') ? 'left' : 'right']: -5,
                  cursor: c + '-resize', zIndex: 10,
                }} />
              ))}
            </>
          )}
        </div>
      );
    }
    
    /* ============================================================================
     * UI — TREE NODE (sidebar)
     * ============================================================================ */
    function TreeNode({ node, selectedId, onSelect, depth = 0 }) {
      const [open, setOpen] = useState(true);
      const isSel = node.id === selectedId;
      const meta = getComponentMeta(node.type);
      return (
        <div>
          <div onClick={() => onSelect(node.id)} style={{
            display: 'flex', alignItems: 'center', gap: 4,
            padding: '3px 6px', paddingLeft: 6 + depth * 12,
            background: isSel ? T.surface2 : 'transparent',
            color: isSel ? meta.color : T.text,
            fontFamily: T.fontMono, fontSize: 11, cursor: 'pointer',
            borderLeft: isSel ? `2px solid ${meta.color}` : '2px solid transparent',
          }}>
            {node.children.length > 0 ? (
              <span onClick={e => { e.stopPropagation(); setOpen(!open); }} style={{ width: 12, color: T.muted }}>{open ? '▾' : '▸'}</span>
            ) : <span style={{ width: 12 }} />}
            <span style={{ width: 8, height: 8, background: meta.color, display: 'inline-block', flexShrink: 0 }} />
            <span style={{ color: T.dim }}>‹{node.type}›</span>
            <span style={{ marginLeft: 4 }}>{node.directives['tekton-tag-name']}</span>
          </div>
          {open && node.children.map(c => <TreeNode key={c.id} node={c} selectedId={selectedId} onSelect={onSelect} depth={depth + 1} />)}
        </div>
      );
    }
    
    /* ============================================================================
     * UI — NODE GRAPH TAB
     * Layouts the tree as a top-down org chart, draws parent→child edges as SVG
     * paths, supports HTML5 DnD on each node to reparent. Click opens the edit
     * modal. Reparent triggers immediately update tree/state/canvas.
     * ============================================================================ */
    const GRAPH = {
      nodeW: 180, nodeH: 64,
      hGap: 24, vGap: 64,
      pad: 40,
    };
    
    /* layoutGraph: walks the tree and produces an array of laid-out nodes
     * { id, x, y, w, h, parentId, depth, type, name }.
     * Algorithm: post-order accumulate subtree widths, then position children
     * centered under each parent. Pure function, easy to tweak. */
    function layoutGraph(root) {
      // pass 1: compute subtree pixel widths
      const widths = new Map();
      const computeW = (n) => {
        if (!n.children.length) { widths.set(n.id, GRAPH.nodeW); return GRAPH.nodeW; }
        const total = n.children.reduce((acc, c, i) => acc + computeW(c) + (i ? GRAPH.hGap : 0), 0);
        const w = Math.max(GRAPH.nodeW, total);
        widths.set(n.id, w);
        return w;
      };
      computeW(root);
      // pass 2: position
      const nodes = [];
      const place = (n, cx, depth, parentId = null) => {
        const w = widths.get(n.id);
        const x = cx - GRAPH.nodeW / 2;
        const y = GRAPH.pad + depth * (GRAPH.nodeH + GRAPH.vGap);
        nodes.push({ id: n.id, x, y, w: GRAPH.nodeW, h: GRAPH.nodeH, parentId, depth, type: n.type, name: n.directives['tekton-tag-name'], childCount: n.children.length });
        let cursor = cx - w / 2;
        for (const c of n.children) {
          const cw = widths.get(c.id);
          place(c, cursor + cw / 2, depth + 1, n.id);
          cursor += cw + GRAPH.hGap;
        }
      };
      const totalW = widths.get(root.id);
      place(root, GRAPH.pad + totalW / 2, 0);
      const totalH = GRAPH.pad * 2 + (Math.max(...nodes.map(n => n.depth)) + 1) * (GRAPH.nodeH + GRAPH.vGap) - GRAPH.vGap;
      return { nodes, width: totalW + GRAPH.pad * 2, height: totalH };
    }
    
    function GraphView({ tree, selectedId, onSelect, onEdit, onReparent }) {
      const layout = useMemo(() => layoutGraph(tree), [tree]);
      const [hoverDropId, setHoverDropId] = useState(null);
      const containerRef = useRef(null);
    
      return (
        <div ref={containerRef} style={{
          flex: 1, overflow: 'auto', background: T.bg,
          backgroundImage: `radial-gradient(circle at 1px 1px, ${T.borderHi} 1px, transparent 0)`,
          backgroundSize: '24px 24px',

    function TektonEditor() {
      const [project, setProject] = useState(() => createProject('Tekton Project'));
      const [selectedId, setSelectedId] = useState(null);
      const [editing, setEditing] = useState(null);
      const [tab, setTab] = useState('editor');     // editor | graph | preview | html | state
      const [consoleCollapsed, setConsoleCollapsed] = useState(false);
      const [showTemplatePicker, setShowTemplatePicker] = useState(false);
      const [showConfig, setShowConfig] = useState(false);
    
      const activeTemplate = project.templates.find(t => t.id === project.activeTemplateId) || project.templates[0];
    
      useEffect(() => { logger.info('Tekton editor v0.2 démarré', { project: project.name, version: project.version }); /* eslint-disable-next-line */ }, []);
    
      /* All tree mutations go through this so derived directives stay in sync. */
      const updateActiveTree = (treeUpdater) => {
        setProject(p => ({
          ...p,
          updatedAt: new Date().toISOString(),
          templates: p.templates.map(t =>
            t.id === p.activeTemplateId
              ? { ...t, tree: recomputeDerivedDirectives(treeUpdater(t.tree)) }
              : t
          ),
        }));
      };
    
      const handleAddComponent = (compType) => {
        const targetParentId = selectedId || activeTemplate.tree.id;
        const newEl = createElement(compType);
        updateActiveTree(tree => addChild(tree, targetParentId, newEl));
        setSelectedId(newEl.id);
        logger.info(`+ ${compType} ajouté`, { parent: targetParentId, id: newEl.id });
      };
    
      const handleUpdateElement = (id, updater) => {
        updateActiveTree(tree => updateElement(tree, id, updater));
      };
    
      const handleDeleteElement = (id) => {
        if (id === activeTemplate.tree.id) { logger.warn('Impossible de supprimer le root'); return; }
        updateActiveTree(tree => removeElement(tree, id));
        if (selectedId === id) setSelectedId(null);
        logger.info('Élément supprimé', { id });
      };
    
      /* Reparent: move sourceId to become last child of newParentId */
      const handleReparent = (sourceId, newParentId) => {
        let outcome = null;
        setProject(p => {
          const t = p.templates.find(x => x.id === p.activeTemplateId);
          const { tree: nextTree, error } = reparentElement(t.tree, sourceId, newParentId);
          if (error) { outcome = { error }; return p; }
          outcome = { ok: true };
          return {
            ...p, updatedAt: new Date().toISOString(),
            templates: p.templates.map(x => x.id === p.activeTemplateId
              ? { ...x, tree: recomputeDerivedDirectives(nextTree) } : x),
          };
        });
        setTimeout(() => {
          if (outcome?.error) logger.warn('Reparent refusé', { reason: outcome.error });
          else logger.info('Reparent', { src: sourceId, parent: newParentId });
        }, 0);
      };
    
      /* Reorder: insert sourceId at index `insertIndex` inside parentId.
       * If source already lives elsewhere, it is detached first; if already in
       * the same parent, the index is adjusted to compensate for self-removal. */
      const handleReorder = (sourceId, parentId, insertIndex) => {
        setProject(p => {
          const t = p.templates.find(x => x.id === p.activeTemplateId);
          let tree = t.tree;
          if (sourceId === tree.id) { logger.warn('Reorder root refusé'); return p; }
          if (isDescendant(tree, sourceId, parentId)) { logger.warn('Reorder cycle refusé'); return p; }
    
          const source = findElement(tree, sourceId);
          const currentParent = findParent(tree, sourceId);
          if (!source || !currentParent) return p;
    
          // adjust insertIndex if same parent (we're going to remove first)
          let adjustedIndex = insertIndex;
          if (currentParent.id === parentId) {
            const currentIdx = currentParent.children.findIndex(c => c.id === sourceId);
            if (currentIdx !== -1 && currentIdx < insertIndex) adjustedIndex = insertIndex - 1;
            if (currentIdx === adjustedIndex) return p; // no-op
          }
    
          // detach
          const detached = removeElement(tree, sourceId);
          // insert at index
          const insertAt = (n) => {
            if (n.id === parentId) {
              const next = [...n.children];
              next.splice(adjustedIndex, 0, source);
              return { ...n, children: next };
            }
            return { ...n, children: n.children.map(insertAt) };
          };
          const nextTree = recomputeDerivedDirectives(insertAt(detached));
          logger.info('Reorder', { src: sourceId, parent: parentId, idx: adjustedIndex });
          return {
            ...p, updatedAt: new Date().toISOString(),
            templates: p.templates.map(x => x.id === p.activeTemplateId ? { ...x, tree: nextTree } : x),
          };
        });
      };
    
      const handleNewTemplate = (defaultTemplate) => {
        const t = createTemplateFrom(defaultTemplate, `${defaultTemplate.name} ${project.templates.length + 1}`);
        setProject(p => ({ ...p, templates: [...p.templates, t], activeTemplateId: t.id }));
        setSelectedId(null);
        setShowTemplatePicker(false);
        logger.info('Template créé', { name: t.name, source: defaultTemplate.id });
      };
    
      const handleCloneTemplate = () => {
        const cloneTree = (n) => ({ ...n, id: newElementId(), children: n.children.map(cloneTree) });
        const cloned = recomputeDerivedDirectives(cloneTree(activeTemplate.tree));
        const clone = { ...activeTemplate, id: newTemplateId(), name: activeTemplate.name + ' (copie)', tree: cloned };
        setProject(p => ({ ...p, templates: [...p.templates, clone], activeTemplateId: clone.id }));
        logger.info('Template cloné', { from: activeTemplate.id, to: clone.id });
      };
    
      const handleDeleteTemplate = () => {
        if (project.templates.length <= 1) { logger.warn('Au moins un template requis'); return; }
        if (!confirm(`Supprimer le template "${activeTemplate.name}" ?`)) return;
        setProject(p => {
          const remaining = p.templates.filter(t => t.id !== p.activeTemplateId);
          return { ...p, templates: remaining, activeTemplateId: remaining[0].id };
        });
        logger.info('Template supprimé', { id: activeTemplate.id });
      };
    
      const handleSetTargetType = (key) => {
        setProject(p => ({ ...p, templates: p.templates.map(t => t.id === p.activeTemplateId ? { ...t, targetType: key } : t) }));
        logger.info('Target type changé', { to: key });
      };
    
      const handleSave = async () => {
        const ok = await StorageAdapter.saveProject(project);
        logger.info(ok ? 'Projet sauvegardé' : 'Échec sauvegarde', { templates: project.templates.length });
      };
      const handleLoad = async () => {
        const loaded = await StorageAdapter.loadProject();
        if (loaded) { setProject(loaded); setSelectedId(null); logger.info('Projet chargé', { name: loaded.name }); }
        else logger.warn('Aucun projet sauvegardé');
      };
    
      const editingElement = editing ? findElement(activeTemplate.tree, editing) : null;
      const selectedElement = selectedId ? findElement(activeTemplate.tree, selectedId) : null;
      const targetType = getTargetTypes().find(t => t.key === activeTemplate.targetType) || getTargetTypes()[0];
    
      return (
        <div style={{
          width: '100%', height: '100vh', minHeight: 700,
          background: T.bg, color: T.text, fontFamily: T.fontUi,
          display: 'flex', flexDirection: 'column', overflow: 'hidden',
        }}>
          <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
    
          {/* HEADER */}
          <div style={{ height: 48, padding: '0 16px', display: 'flex', alignItems: 'center', gap: 16, borderBottom: `1px solid ${T.border}`, background: T.surface, flexShrink: 0 }}>

              <span style={{ color: T.dim, fontFamily: T.fontMono, fontSize: 11 }}>editor · v0.2</span>
            </div>
            <div style={{ height: 20, width: 1, background: T.border }} />
            <input value={project.name} onChange={e => setProject(p => ({ ...p, name: e.target.value }))}
              style={{ background: 'transparent', border: 'none', color: T.text, fontFamily: T.fontUi, fontSize: 14, fontWeight: 600, outline: 'none', width: 200 }} />
            <span style={{ color: T.dim, fontFamily: T.fontMono, fontSize: 11 }}>{project.version}</span>

          <div style={{ height: 36, padding: '0 12px', display: 'flex', alignItems: 'center', gap: 4, borderBottom: `1px solid ${T.border}`, background: T.surface2, flexShrink: 0, overflowX: 'auto' }}>
            {project.templates.map(t => (
              <button key={t.id} onClick={() => { setProject(p => ({ ...p, activeTemplateId: t.id })); setSelectedId(null); }}
                style={{
                  padding: '4px 12px', fontFamily: T.fontMono, fontSize: 11,
                  background: t.id === project.activeTemplateId ? T.bg : 'transparent',
                  color: t.id === project.activeTemplateId ? T.accent : T.muted,
                  border: `1px solid ${t.id === project.activeTemplateId ? T.accent : T.border}`,
                  cursor: 'pointer', whiteSpace: 'nowrap',
                }}>{t.name}</button>
            ))}
            <button onClick={() => setShowTemplatePicker(true)} style={{ padding: '4px 10px', fontFamily: T.fontMono, fontSize: 11, background: 'transparent', color: T.accent, border: `1px dashed ${T.accent}`, cursor: 'pointer' }}>+ template</button>
            <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 6 }}>
              <span style={{ color: T.dim, fontFamily: T.fontMono, fontSize: 10, textTransform: 'uppercase', letterSpacing: 1 }}>cible</span>
              <select value={activeTemplate.targetType} onChange={e => handleSetTargetType(e.target.value)}
                style={{ background: T.bg, color: T.text, border: `1px solid ${T.border}`, fontFamily: T.fontMono, fontSize: 11, padding: '3px 6px' }}>
                {getTargetTypes().map(t => <option key={t.key} value={t.key}>{t.label} {t.viewport.width}×{t.viewport.height}</option>)}
              </select>
              <button onClick={handleCloneTemplate} style={ghostBtn()}>clone</button>
              <button onClick={handleDeleteTemplate} style={ghostBtn(T.bad)}>delete tpl</button>
            </div>
          </div>
    
          {/* MAIN BODY */}
          <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
            {/* LEFT SIDEBAR */}
            <div style={{ width: 240, borderRight: `1px solid ${T.border}`, background: T.surface, display: 'flex', flexDirection: 'column' }}>
              <div style={{ padding: '10px 12px 6px', color: T.muted, fontFamily: T.fontMono, fontSize: 10, letterSpacing: 1.5, textTransform: 'uppercase' }}>Composants</div>
              <div style={{ padding: '0 8px 8px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
                {getAvailableComponents().map(c => (
                  <button key={c.type} onClick={() => handleAddComponent(c.type)} style={{
                    padding: '8px 6px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
                    background: T.bg, border: `1px solid ${T.border}`, borderLeft: `3px solid ${c.color}`,
                    color: T.text, fontFamily: T.fontMono, fontSize: 10, cursor: 'pointer', transition: 'all 120ms',
                  }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = c.color; e.currentTarget.style.borderLeftColor = c.color; e.currentTarget.style.color = c.color; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = T.border; e.currentTarget.style.borderLeftColor = c.color; e.currentTarget.style.color = T.text; }}>
                    <span style={{ fontSize: 18, color: c.color }}>{c.icon}</span>
                    <span>{c.label}</span>
                  </button>
                ))}
              </div>
    
              <div style={{ borderTop: `1px solid ${T.border}`, padding: '10px 12px 6px', color: T.muted, fontFamily: T.fontMono, fontSize: 10, letterSpacing: 1.5, textTransform: 'uppercase', display: 'flex', justifyContent: 'space-between' }}>
                <span>Arbre</span>
                <span style={{ color: T.dim }}>{selectedElement ? 'parent: ' + selectedElement.id.slice(0, 10) : 'root'}</span>
              </div>
              <div style={{ flex: 1, overflowY: 'auto', paddingBottom: 8 }}>
                <TreeNode node={activeTemplate.tree} selectedId={selectedId} onSelect={setSelectedId} />
              </div>
    
              {selectedElement && (
                <div style={{ borderTop: `1px solid ${T.border}`, padding: 8, display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                  <button onClick={() => setEditing(selectedId)} style={ghostBtn(T.accent)}>edit</button>
                  <button onClick={() => handleDeleteElement(selectedId)} style={ghostBtn(T.bad)}>delete</button>
                  <button onClick={() => setSelectedId(null)} style={ghostBtn()}>deselect</button>
                </div>
              )}
            </div>
    
            {/* CENTER */}
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
              <Tabs value={tab} onChange={setTab} tabs={[
                { key: 'editor',  label: '◫ editor' },
                { key: 'graph',   label: '⌘ graph' },
                { key: 'preview', label: '◉ preview' },
                { key: 'html',    label: '⌗ html' },
                { key: 'state',   label: '{ } state' },
              ]} />
    
              {tab === 'editor' && (
                <div style={{ flex: 1, overflow: 'auto', background: '#1c1f26', padding: 32 }} onClick={() => setSelectedId(null)}>
                  <div style={{ width: targetType.viewport.width, margin: '0 auto', background: '#fff', boxShadow: '0 0 0 1px ' + T.borderHi + ', 0 20px 60px rgba(0,0,0,0.4)', minHeight: 100 }} onClick={e => e.stopPropagation()}>
                    <ElementOnCanvas
                      element={activeTemplate.tree}
                      selectedId={selectedId}
                      onSelect={setSelectedId}
                      onUpdate={(updater) => updateActiveTree(tree => updater(tree))}
                      onDelete={handleDeleteElement}
                      onEdit={setEditing}
                      onReparent={handleReparent}
                      onReorder={handleReorder}
                      projectConfig={project.config}
                      templateConfig={activeTemplate.config}
                    />
                  </div>
                  <div style={{ marginTop: 16, textAlign: 'center', color: T.dim, fontFamily: T.fontMono, fontSize: 10, lineHeight: 1.6 }}>
                    clic = sélectionner · drag = déplacer dans le flux · <span style={{ color: T.accent }}>Alt + drag du label</span> = libérer en position absolue · poignées coin = redimensionner
                  </div>
                </div>
              )}
    
              {tab === 'graph' && (
                <GraphView
                  tree={activeTemplate.tree}
                  selectedId={selectedId}
                  onSelect={setSelectedId}
                  onEdit={setEditing}
                  onReparent={handleReparent}
                />
              )}
    
              {tab === 'preview' && (
                <LivePreview tree={activeTemplate.tree} projectConfig={project.config} templateConfig={activeTemplate.config} viewport={targetType.viewport} />
              )}
              {tab === 'html'  && <HtmlOutput tree={activeTemplate.tree} projectConfig={project.config} templateConfig={activeTemplate.config} />}
              {tab === 'state' && <StateJson project={project} />}
            </div>
          </div>
    
          <ConsolePanel collapsed={consoleCollapsed} onToggle={() => setConsoleCollapsed(v => !v)} />
    
          <EditModal
            element={editingElement}
            projectConfig={project.config}
            templateConfig={activeTemplate.config}
            onClose={() => setEditing(null)}
            onChange={(updater) => handleUpdateElement(editing, updater)}
            onDelete={handleDeleteElement}
          />
    
          <TemplatePicker open={showTemplatePicker} onClose={() => setShowTemplatePicker(false)} onPick={handleNewTemplate} />
          <ProjectConfigModal open={showConfig} project={project} onClose={() => setShowConfig(false)} onChange={setProject} />
        </div>
      );
    }
    

    /* ============================================================================
     * END — TEKTON EDITOR source
     * ============================================================================ */

    /* === Bootstrap === */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TektonEditor />);

    /* Hide the boot splash once React has rendered */
    requestAnimationFrame(() => {
      const boot = document.getElementById('boot');
      if (boot) {
        boot.style.opacity = '0';
        setTimeout(() => boot.remove(), 220);
      }
    });
  </script>
</body>
</html>
